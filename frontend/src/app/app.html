<div class="min-h-screen bg-gray-100">
  <!-- Top Navigation -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
          </svg>
          <span class="text-xl font-bold text-gray-900">PharmaCare</span>
        </div>

        <!-- Desktop Navigation -->
        <div class="hidden md:flex items-center gap-1">
          <a routerLink="/catalog" routerLinkActive="bg-blue-50 text-blue-700"
            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">
            Catalog
          </a>
          <a routerLink="/cart" routerLinkActive="bg-blue-50 text-blue-700"
            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition relative">
            Cart
            @if (cartService.itemCount() > 0) {
              <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">
                {{ cartService.itemCount() }}
              </span>
            }
          </a>
          <a routerLink="/customers" routerLinkActive="bg-blue-50 text-blue-700"
            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">
            Customers
          </a>
          <a routerLink="/payment" routerLinkActive="bg-blue-50 text-blue-700"
            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">
            Payment
          </a>
        </div>

        <!-- Cart Summary (Desktop) -->
        <div class="hidden md:flex items-center gap-4">
          @if (cartService.itemCount() > 0) {
            <div class="text-sm text-gray-600">
              Total: <span class="font-bold text-gray-900">৳{{ cartService.total().toFixed(2) }}</span>
            </div>
          }
        </div>

        <!-- Mobile Menu Button -->
        <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (mobileMenuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            }
          </svg>
        </button>
      </div>

      <!-- Mobile Navigation -->
      @if (mobileMenuOpen()) {
        <div class="md:hidden py-3 space-y-1 border-t border-gray-200">
          <a routerLink="/catalog" routerLinkActive="bg-blue-50 text-blue-700" (click)="toggleMobileMenu()"
            class="block px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
            Catalog
          </a>
          <a routerLink="/cart" routerLinkActive="bg-blue-50 text-blue-700" (click)="toggleMobileMenu()"
            class="block px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
            Cart ({{ cartService.itemCount() }})
          </a>
          <a routerLink="/customers" routerLinkActive="bg-blue-50 text-blue-700" (click)="toggleMobileMenu()"
            class="block px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
            Customers
          </a>
          <a routerLink="/payment" routerLinkActive="bg-blue-50 text-blue-700" (click)="toggleMobileMenu()"
            class="block px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
            Payment
          </a>
        </div>
      }
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto">
    <router-outlet />
  </main>
</div>
